
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="favicon.ico">

    <title>Mundo das Alianças</title>

    <link rel="canonical" href="https://getbootstrap.com/docs/4.0/examples/starter-template/">

    <!-- Bootstrap core CSS -->
    <link href="dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  </head>

  <body class="text-center">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">  
        <div class="collapse navbar-collapse" id="navbarsExampleDefault">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
              <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#openModal">Link</a>
            </li>
          </ul>
        </div>
      </nav>
    <main role="main" class="container">
        <div class="starter-template">
            <h3>Cadastro de clientes pós venda</h3>
            <form class="form" id="contactForm">
                <div class="form-group mb-2">
                    <input type="text" id="name" placeholder="Nome" class="form-control" required>
                    <input type="email" id="email" placeholder="Email" class="form-control" required>
                    <input type="tel" id="tel" placeholder="Telefone" class="form-control" required>
                    <input type="date" id="date1" placeholder="Email" class="form-control" required>
                    <input type="date" id="date2" placeholder="Email" class="form-control" required>
                    <input type="date" id="date3" placeholder="Email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary mb-2">Adicionar</button>
            </form>
            
            <table class="table" id="contactTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Data 1</th>
                        <th>Data 2</th>
                        <th>Data 3</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="contactList"></tbody>
            </table>    
            <script>
                const firebaseConfig = {
                    apiKey: "AIzaSyAgce2fFgDwrDqhH_K9y7mP9F7vBZVv_Uo",
                    authDomain: "mundo-aliancas.firebaseapp.com",
                    projectId: "mundo-aliancas",
                    storageBucket: "mundo-aliancas.appspot.com",
                    messagingSenderId: "874201609919",
                    appId: "1:874201609919:web:68657a34e873b5ba1af80a"
                };
        
                // Inicialize o Firebase
            firebase.initializeApp(firebaseConfig);

            const db = firebase.database();

            const contactForm = $('#contactForm');
            const contactList = $('#contactList');

            // Função para adicionar um contato
            contactForm.on('submit', function(event) {
                event.preventDefault();

                const name = $('#name').val();
                const email = $('#email').val();
                const tel = $('#tel').val();
                const date1 = $('#date1').val();
                const date2 = $('#date2').val();
                const date3 = $('#date3').val();

                db.ref("contacts").push({
                    name: name,
                    email: email,
                    tel: tel,
                    date1: date1,
                    date2: date2,
                    date3: date3
                })
                .then(function() {
                    console.log("Contato adicionado com sucesso!");
                    contactForm[0].reset();
                })
                .catch(function(error) {
                    console.error("Erro ao adicionar contato: ", error);
                });
            });

            // Função para exibir os contatos
            function displayContacts() {
                db.ref("contacts").on("value", function(snapshot) {
                    contactList.empty();
                    snapshot.forEach(function(childSnapshot) {
                        const contact = childSnapshot.val();
                        const tr = $('<tr>');
                        $('<td>').text(contact.name).appendTo(tr);
                        $('<td>').text(contact.email).appendTo(tr);
                        $('<td>').text(contact.tel).appendTo(tr);    
                        $('<td>').text(contact.date1).appendTo(tr);
                        $('<td>').text(contact.date2).appendTo(tr);
                        $('<td>').text(contact.date3).appendTo(tr);     
                        const deleteButton = $('<button class="btn btn-danger">').text('Delete').on('click', function() {
                            deleteContact(childSnapshot.key);
                        });
                        $('<td>').append(deleteButton).appendTo(tr);
                        contactList.append(tr);
                    });
                });
            }

            // Função para excluir um contato
            function deleteContact(id) {
                db.ref("contacts/" + id).remove()
                .then(function() {
                    console.log("Contato excluído com sucesso!");
                }).catch(function(error) {
                    console.error("Erro ao excluir contato: ", error);
                });
            }

            // Exibir os contatos ao carregar a página
            displayContacts();
            </script>
        </div>
    </main><!-- /.container -->
    <!-- Modal -->
    <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Modal Title</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    This is the content of the modal.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script>window.jQuery || document.write('<script src="assets/js/vendor/jquery-slim.min.js"><\/script>')</script>
    <script src="assets/js/vendor/popper.min.js"></script>
    <script src="dist/js/bootstrap.min.js"></script>
    <script>
        // Quando o link é clicado, abre o modal
        $('#openModal').on('click', function() {
            $('#myModal').modal('show');
        });
    </script>
  </body>
</html>
